<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="갓생 루틴" />
  <title>갓생 루틴</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="screen active" id="homeScreen">
      <header class="top">
        <div>
          <h1>오늘 루틴</h1>
          <p id="todayText"></p>
        </div>
        <button class="circle-btn" id="addRoutineBtn">+</button>
      </header>
      <section class="routine-list" id="routineList"></section>
      <section class="card progress-card">
        <p class="eyebrow">이번 달 루틴 달성률</p>
        <h2 id="monthlyPercent">0%</h2>
        <p id="monthlyCount">0일 / 0일</p>
        <canvas id="miniChart"></canvas>
      </section>
    </section>

    <section class="screen" id="recordScreen">
      <header class="top center">
        <button class="ghost-btn" id="prevMonth">‹</button>
        <div>
          <h1>기록</h1>
          <p id="monthTitle"></p>
        </div>
        <button class="ghost-btn" id="nextMonth">›</button>
      </header>
      <section class="card big-chart-card">
        <p class="eyebrow">이번 달 루틴 달성률</p>
        <h2 id="recordPercent">0%</h2>
        <p id="recordCount">0일 / 0일</p>
        <canvas id="monthChart"></canvas>
      </section>
      <section class="card calendar-card">
        <div class="card-head">
          <h3>루틴 달성 일수</h3>
          <strong id="doneDays">0일</strong>
        </div>
        <div class="week-row"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
        <div class="month-grid" id="monthGrid"></div>
      </section>
    </section>

    <section class="screen" id="noteScreen">
      <header class="top">
        <div>
          <h1>노트</h1>
          <p id="noteDateText"></p>
        </div>
      </header>
      <section class="card note-card">
        <div class="card-head">
          <div>
            <h3>감사 노트</h3>
            <p>오늘 감사한 일을 적어봐.</p>
          </div>
          <span>☺</span>
        </div>
        <textarea id="gratitudeNote" maxlength="300" placeholder="예) 오늘 날씨가 좋아서 기분이 좋았다."></textarea>
        <p class="char-count"><span id="gratitudeCount">0</span>/300</p>
      </section>
      <section class="card note-card">
        <div class="card-head">
          <div>
            <h3>오늘의 중요한 일</h3>
            <p>오늘 가장 중요한 1~3가지를 적어봐.</p>
          </div>
          <span>☆</span>
        </div>
        <textarea id="importantNote" maxlength="300" placeholder="1.&#10;2.&#10;3."></textarea>
        <p class="char-count"><span id="importantCount">0</span>/300</p>
      </section>
    </section>

    <section class="screen" id="profileScreen">
      <header class="top">
        <div>
          <h1>내 정보</h1>
          <p>루틴 관리</p>
        </div>
      </header>
      <section class="card">
        <h3>루틴 목록</h3>
        <p class="muted">기본 루틴을 수정하거나 삭제할 수 있어.</p>
        <div id="manageList" class="manage-list"></div>
      </section>
      <section class="card danger-card">
        <h3>데이터 초기화</h3>
        <p class="muted">체크 기록, 노트, 루틴이 전부 삭제돼.</p>
        <button id="resetBtn" class="danger-btn">전체 초기화</button>
      </section>
    </section>

    <nav class="tabs">
      <button class="tab active" data-tab="homeScreen"><span>⌂</span><small>홈</small></button>
      <button class="tab" data-tab="recordScreen"><span>▥</span><small>기록</small></button>
      <button class="tab" data-tab="noteScreen"><span>☷</span><small>노트</small></button>
      <button class="tab" data-tab="profileScreen"><span>♙</span><small>내 정보</small></button>
    </nav>
  </main>

  <dialog id="routineDialog">
    <form method="dialog" class="dialog-box">
      <h3 id="dialogTitle">루틴 추가</h3>
      <input id="routineInput" type="text" maxlength="30" placeholder="예) 독서 30분" />
      <div class="dialog-actions">
        <button value="cancel" class="secondary">취소</button>
        <button id="saveRoutineBtn" value="default">저장</button>
      </div>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
</body>
</html>
