<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>갓생 루틴</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="screen active" id="homeScreen">
      <header class="top">
        <div>
          <h1>갓생 루틴</h1>
          <p id="todayLabel"></p>
        </div>
        <button id="addRoutineBtn" class="add-btn">+</button>
      </header>

      <input type="date" id="datePicker" class="date-picker" />

      <section id="routineList" class="routine-list"></section>

      <section class="card note-card">
        <h3>감사 노트</h3>
        <textarea id="gratitudeNote"></textarea>
      </section>

      <section class="card note-card">
        <h3>오늘의 중요한 일</h3>
        <textarea id="importantNote"></textarea>
      </section>

      <section class="card chart-card">
        <h3>오늘 체크</h3>
        <p id="todayCountText">0개 완료</p>
        <canvas id="todayChart"></canvas>
      </section>
    </section>

    <section class="screen" id="recordScreen">
      <header class="top">
        <div>
          <h1>기록</h1>
          <p id="monthLabel"></p>
        </div>
      </header>

      <section class="card chart-card">
        <h3>한달 기록</h3>
        <canvas id="monthChart"></canvas>
      </section>

      <section class="card calendar-card">
        <div class="week-row">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div id="monthGrid" class="month-grid"></div>
      </section>
    </section>

    <nav class="tabs">
      <button class="tab active" data-tab="homeScreen">홈</button>
      <button class="tab" data-tab="recordScreen">기록</button>
    </nav>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
</body>
</html>
