<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>갓생 루틴 앱</title>
<style>
:root{
  --bg:#f2f2f7;
  --card:#ffffff;
  --text:#111111;
  --muted:#7a7a82;
  --line:#e6e6eb;
  --blue:#007aff;
  --green:#34c759;
  --orange:#ff9500;
  --purple:#af52de;
  --shadow:0 18px 45px rgba(0,0,0,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  min-height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.app{width:min(720px,100%);margin:0 auto}
.header{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(242,242,247,.88);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  padding:18px 18px 12px;
  border-bottom:1px solid rgba(0,0,0,.04);
}
.titleRow{display:flex;align-items:center;gap:10px}
.icon{
  width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#fff,#e9f3ff);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  font-size:24px;
}
h1{margin:0;font-size:28px;letter-spacing:-.8px;line-height:1.05}
.sub{margin:8px 0 0 52px;color:var(--muted);font-size:14px}
.main{padding:16px 16px 34px}
.card{
  background:var(--card);
  border-radius:28px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}
.dateBox{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.dateBox label{font-size:14px;color:var(--muted);font-weight:800}
input[type="date"]{
  border:0;
  background:#f2f2f7;
  padding:10px 12px;
  border-radius:14px;
  font-size:15px;
  font-weight:800;
}
.score{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:16px;
}
.bigNum{font-size:44px;font-weight:900;letter-spacing:-1.5px}
.bigNum span{font-size:20px;color:var(--muted)}
.progressWrap{
  height:16px;
  background:#f2f2f7;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}
.progress{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--green),#7ee08c);
  transition:.25s ease;
}
.ring{
  width:92px;height:92px;border-radius:50%;
  background:conic-gradient(var(--green) 0deg,#e9e9ef 0deg);
  display:flex;align-items:center;justify-content:center;
}
.ringInner{
  width:68px;height:68px;border-radius:50%;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:900;
}
.sectionTitle{
  font-size:18px;
  font-weight:900;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.smallBtn{
  border:0;
  background:#f2f2f7;
  color:#111;
  border-radius:14px;
  padding:9px 12px;
  font-weight:850;
  font-size:14px;
}
.routineList{display:grid;gap:10px}
.routine{
  display:flex;
  align-items:center;
  gap:12px;
  background:#f8f8fb;
  border-radius:20px;
  padding:12px;
}
.check{
  width:30px;height:30px;border-radius:50%;
  border:2px solid #d1d1d6;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  flex:0 0 30px;
}
.routine.done .check{
  background:var(--green);
  border-color:var(--green);
  color:white;
}
.routineText{flex:1;font-size:17px;font-weight:750}
.routine.done .routineText{text-decoration:line-through;color:var(--muted)}
.deleteBtn{
  border:0;background:transparent;color:#c7c7cc;font-size:22px;padding:2px 6px;
}
.addRow{display:flex;gap:10px;margin-top:12px}
.addRow input{
  flex:1;border:0;background:#f2f2f7;border-radius:16px;padding:13px;font-size:16px;
}
.addRow button{
  border:0;background:#111;color:white;border-radius:16px;padding:0 16px;font-weight:900;font-size:15px;
}
textarea{
  width:100%;
  min-height:96px;
  resize:vertical;
  border:0;
  outline:0;
  background:#f2f2f7;
  border-radius:18px;
  padding:14px;
  font-size:17px;
  line-height:1.45;
  font-family:inherit;
}
.memoLabel{font-size:15px;font-weight:900;margin:0 0 8px}
.memoBlock{margin-top:14px}
.status{color:var(--muted);font-size:13px;min-height:20px;margin-top:8px}
.chart{
  display:flex;
  align-items:end;
  gap:8px;
  height:150px;
  padding-top:10px;
}
.barWrap{flex:1;text-align:center;min-width:0}
.bar{
  height:8px;
  background:linear-gradient(180deg,#7ee08c,var(--green));
  border-radius:999px 999px 6px 6px;
  min-height:8px;
  transition:.25s ease;
}
.barLabel{font-size:11px;color:var(--muted);margin-top:7px;font-weight:800}
.barValue{font-size:11px;color:#333;margin-bottom:4px;font-weight:900}
.tip{text-align:center;color:var(--muted);font-size:13px;line-height:1.45;margin:16px 4px 0}
@media(max-width:390px){
  h1{font-size:25px}
  .sub{margin-left:52px}
  .bigNum{font-size:38px}
  .ring{width:82px;height:82px}
  .ringInner{width:60px;height:60px}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="titleRow">
      <div class="icon">✅</div>
      <h1>갓생 루틴</h1>
    </div>
    <p class="sub">오늘 할 일 체크하고, 감사와 중요한 걸 기록하기</p>
  </header>

  <main class="main">
    <section class="card dateBox">
      <div>
        <label for="datePicker">기록 날짜</label>
        <div style="font-weight:900;font-size:20px;margin-top:4px" id="dateTitle">오늘</div>
      </div>
      <input type="date" id="datePicker" onchange="changeDate()">
    </section>

    <section class="card score">
      <div>
        <div class="bigNum"><span id="doneCount">0</span><span> / <span id="totalCount">0</span>개 완료</span></div>
        <div class="progressWrap"><div class="progress" id="progress"></div></div>
      </div>
      <div class="ring" id="ring"><div class="ringInner" id="percent">0%</div></div>
    </section>

    <section class="card">
      <div class="sectionTitle">
        <span>오늘 루틴</span>
        <button class="smallBtn" onclick="resetToday()">오늘 기록 리셋</button>
      </div>
      <div class="routineList" id="routineList"></div>
      <div class="addRow">
        <input id="newRoutine" placeholder="루틴 추가: 예) 물 2L 마시기">
        <button onclick="addRoutine()">추가</button>
      </div>
    </section>

    <section class="card">
      <div class="sectionTitle">오늘 기록</div>
      <div class="memoBlock">
        <div class="memoLabel">🙏 감사한 것</div>
        <textarea id="gratitude" placeholder="오늘 감사한 일을 적어봐"></textarea>
      </div>
      <div class="memoBlock">
        <div class="memoLabel">⭐ 오늘 중요하다고 생각한 것</div>
        <textarea id="important" placeholder="오늘 가장 중요했던 것, 깨달은 것, 우선순위를 적어봐"></textarea>
      </div>
      <div class="status" id="status">자동 저장 준비됨</div>
    </section>

    <section class="card">
      <div class="sectionTitle">최근 7일 완료 그래프</div>
      <div class="chart" id="chart"></div>
    </section>

    <p class="tip">같은 앱 주소로 계속 업데이트하면 기록은 유지돼. 홈화면에 추가해서 앱처럼 쓰면 딱 좋음 😎</p>
  </main>
</div>

<script>
const defaultRoutines = [
  "물 충분히 마시기",
  "운동 / 스트레칭",
  "성경 읽기",
  "영어 공부",
  "집 정리 10분",
  "일찍 자기"
];

let selectedDate = "";

function isoToday(){
  const d = new Date();
  return d.toISOString().split("T")[0];
}
function dateKey(){
  return selectedDate || isoToday();
}
function routinesKey(){ return "godlife_routines_v1"; }
function checkedKey(date){ return "godlife_checked_" + date; }
function gratitudeKey(date){ return "godlife_gratitude_" + date; }
function importantKey(date){ return "godlife_important_" + date; }

function getRoutines(){
  try {
    return JSON.parse(localStorage.getItem(routinesKey())) || defaultRoutines;
  } catch(e) {
    return defaultRoutines;
  }
}
function setRoutines(routines){
  localStorage.setItem(routinesKey(), JSON.stringify(routines));
}
function getChecked(date){
  try {
    return JSON.parse(localStorage.getItem(checkedKey(date))) || {};
  } catch(e) {
    return {};
  }
}
function setChecked(date, checked){
  localStorage.setItem(checkedKey(date), JSON.stringify(checked));
}
function changeDate(){
  selectedDate = document.getElementById("datePicker").value || isoToday();
  loadDay();
}
function renderDate(){
  const picker = document.getElementById("datePicker");
  if(!picker.value) picker.value = isoToday();
  selectedDate = picker.value;
  document.getElementById("dateTitle").textContent = selectedDate === isoToday() ? "오늘" : selectedDate;
}
function renderRoutines(){
  const routines = getRoutines();
  const checked = getChecked(dateKey());
  const list = document.getElementById("routineList");
  list.innerHTML = "";

  routines.forEach((text, idx) => {
    const done = !!checked[idx];
    const row = document.createElement("div");
    row.className = "routine" + (done ? " done" : "");
    row.onclick = () => toggleRoutine(idx);
    row.innerHTML = `
      <div class="check">${done ? "✓" : ""}</div>
      <div class="routineText">${escapeHtml(text)}</div>
      <button class="deleteBtn" onclick="event.stopPropagation(); deleteRoutine(${idx})">×</button>
    `;
    list.appendChild(row);
  });
  updateScore();
}
function toggleRoutine(idx){
  const checked = getChecked(dateKey());
  checked[idx] = !checked[idx];
  setChecked(dateKey(), checked);
  renderRoutines();
  renderChart();
}
function addRoutine(){
  const input = document.getElementById("newRoutine");
  const value = input.value.trim();
  if(!value) return;
  const routines = getRoutines();
  routines.push(value);
  setRoutines(routines);
  input.value = "";
  renderRoutines();
  renderChart();
}
function deleteRoutine(idx){
  const routines = getRoutines();
  routines.splice(idx,1);
  setRoutines(routines);
  renderRoutines();
  renderChart();
}
function resetToday(){
  if(!confirm("이 날짜의 루틴 체크만 리셋할까? 메모는 그대로 둬.")) return;
  localStorage.removeItem(checkedKey(dateKey()));
  renderRoutines();
  renderChart();
}
function updateScore(){
  const routines = getRoutines();
  const checked = getChecked(dateKey());
  const total = routines.length;
  const done = routines.filter((_,idx)=>checked[idx]).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById("doneCount").textContent = done;
  document.getElementById("totalCount").textContent = total;
  document.getElementById("progress").style.width = pct + "%";
  document.getElementById("percent").textContent = pct + "%";
  document.getElementById("ring").style.background = `conic-gradient(var(--green) ${pct*3.6}deg,#e9e9ef 0deg)`;
}
function saveNotes(){
  localStorage.setItem(gratitudeKey(dateKey()), document.getElementById("gratitude").value);
  localStorage.setItem(importantKey(dateKey()), document.getElementById("important").value);
  document.getElementById("status").textContent = "자동 저장됨 👍";
}
function loadNotes(){
  document.getElementById("gratitude").value = localStorage.getItem(gratitudeKey(dateKey())) || "";
  document.getElementById("important").value = localStorage.getItem(importantKey(dateKey())) || "";
  document.getElementById("status").textContent = "이 날짜 기록을 불러왔어";
}
function getPastDates(n){
  const arr = [];
  const base = new Date(dateKey()+"T00:00:00");
  for(let i=n-1;i>=0;i--){
    const d = new Date(base);
    d.setDate(base.getDate()-i);
    arr.push(d.toISOString().split("T")[0]);
  }
  return arr;
}
function renderChart(){
  const chart = document.getElementById("chart");
  const routines = getRoutines();
  const total = Math.max(1, routines.length);
  const dates = getPastDates(7);
  chart.innerHTML = "";
  dates.forEach(date => {
    const checked = getChecked(date);
    const done = routines.filter((_,idx)=>checked[idx]).length;
    const pct = Math.round(done/total*100);
    const height = Math.max(8, Math.round(pct * 1.2));
    const label = date.slice(5).replace("-","/");
    const wrap = document.createElement("div");
    wrap.className = "barWrap";
    wrap.innerHTML = `
      <div class="barValue">${done}</div>
      <div class="bar" style="height:${height}px"></div>
      <div class="barLabel">${label}</div>
    `;
    chart.appendChild(wrap);
  });
}
function loadDay(){
  renderDate();
  renderRoutines();
  loadNotes();
  renderChart();
}
function escapeHtml(str){
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
}

let noteTimer = null;
document.getElementById("gratitude").addEventListener("input", () => {
  document.getElementById("status").textContent = "저장 중...";
  clearTimeout(noteTimer);
  noteTimer = setTimeout(saveNotes,300);
});
document.getElementById("important").addEventListener("input", () => {
  document.getElementById("status").textContent = "저장 중...";
  clearTimeout(noteTimer);
  noteTimer = setTimeout(saveNotes,300);
});

document.getElementById("datePicker").value = isoToday();
loadDay();
</script>
</body>
</html>
